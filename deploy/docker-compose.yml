services:
  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      ADDR: :8080
      DB_PATH: /data/panel.db
      MC_ROOT_DIR: /minecraft
      MC_EXECUTABLE_PATH: /minecraft/bedrock_server
      MC_WORKING_DIR: /minecraft
      ENABLE_PROMETHEUS: "true"
      AUTH_ENABLED: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in deploy/.env}
    volumes:
      - panel-data:/data
      - ../bedrock-server:/minecraft
    expose:
      - "8080"
  frontend:
    build: ../frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "80:80"
  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
volumes:
  panel-data:
  prometheus-data:
  grafana-data:
